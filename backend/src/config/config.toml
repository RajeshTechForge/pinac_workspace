# ========================================================================
#  Pinac Workspace Backend — System Configuration
# ========================================================================

[app]
name = "Pinac Workspace API"
version = "1.0.0"
env = "development"       # "development" | "production"
debug = false

[security]
algorithm = "HS256"

[cors]
allow_origins = []
allow_credentials = true
allow_methods = ["GET", "POST", "PUT", "DELETE"]
allow_headers = ["*"]
