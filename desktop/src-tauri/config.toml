[llm]
defaultProvider = "anthropic"

[[llm.providers]]
value = "anthropic"
label = "Anthropic"
apiKeyName = "ANTHROPIC_API_KEY"
defaultModel = "claude-sonnet-4-6"
models = [
    { id = "claude-opus-4-8",  name = "Claude Opus 4.8", thinking = { mode = "adaptive", efforts = ["low","medium","high","xhigh","max"], defaultEffort = "medium" } },
    { id = "claude-opus-4-7",  name = "Claude Opus 4.7", thinking = { mode = "adaptive", efforts = ["low","medium","high","xhigh"], defaultEffort = "medium" } },
    { id = "claude-opus-4-6",  name = "Claude Opus 4.6", thinking = { mode = "adaptive", efforts = ["low","medium","high"], defaultEffort = "medium" } },
    { id = "claude-sonnet-4-6",  name = "Claude Sonnet 4.6", thinking = { mode = "adaptive", efforts = ["low","medium","high"], defaultEffort = "medium" } },
    { id = "claude-haiku-4-5-20251001",  name = "Claude Haiku 4.5", thinking = { mode = "enabled", efforts = ["low","medium","high"], defaultEffort = "medium" } },
]

